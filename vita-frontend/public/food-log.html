<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Food log — Vitality</title>
  <link rel="icon" type="image/png" href="vitality-favicon.png" sizes="128x128" />
  <link rel="stylesheet" href="styles/main.css" />
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
</head>
<body>
  <div class="app has-side">
    <aside class="side-nav"></aside>
    <div>
      <header class="app-header">
        <div class="container">
          <h2>Food log</h2>
          <button class="btn btn-ghost" id="theme-btn" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
        </div>
      </header>
      <main class="container stack">
        <section class="card">
          <div class="card-title">Log a new meal</div>
          <label for="file" class="dropzone" id="dropzone">
            <i data-lucide="camera"></i>
            <div><strong>Drop a photo, or click to choose</strong></div>
            <div class="text-xs muted mt-1">JPEG / PNG, up to 10 MB</div>
            <input id="file" type="file" accept="image/jpeg,image/png" capture="environment" hidden />
          </label>
          <div id="preview-wrap" class="mt-2 hidden">
            <img id="preview" alt="Selected meal" style="width:100%; max-height:280px; object-fit:cover; border-radius:12px"/>
            <div class="mt-2">
              <label for="portion-size">Portion size <span class="muted text-xs">(number of servings)</span></label>
              <input id="portion-size" type="number" min="0.25" max="10" step="0.25" value="1" placeholder="e.g. 1" style="width:auto; min-width:120px" />
            </div>
            <div class="row gap-sm mt-2">
              <button class="btn btn-primary" id="analyze-btn"><i data-lucide="sparkles"></i> Analyze meal</button>
              <button class="btn btn-ghost" id="clear-btn">Clear</button>
            </div>
          </div>
        </section>

        <section id="result" class="hidden"></section>

        <section>
          <div class="row between mb-1 flex-wrap">
            <h2>Meal history</h2>
            <div class="filter-row">
              <label class="text-xs muted" for="date-filter">Filter by date</label>
              <input type="date" id="date-filter" style="width:auto" />
            </div>
          </div>
          <div class="list" id="history"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="overlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="spinner"></div>
      <strong>Identifying your meal…</strong>
      <p class="muted text-sm mt-1">Our vision model is recognizing items and estimating portions.</p>
    </div>
  </div>

  <script async src="https://unpkg.com/lucide@latest" onload="window.lucide&&window.lucide.createIcons()"></script>
  <script type="module" src="js/food-log.js"></script>
</body>
</html>
