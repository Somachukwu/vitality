name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["vita-frontend/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy vita-frontend to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: vita-frontend
