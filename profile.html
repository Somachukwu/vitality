<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — Vitality</title>
  <link rel="icon" type="image/png" href="vitality-favicon.png" sizes="128x128" />
  <link rel="stylesheet" href="styles/main.css" />
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
</head>
<body>
  <div class="app has-side">
    <aside class="side-nav"></aside>
    <div>
      <header class="app-header">
        <div class="container">
          <h2>Profile & settings</h2>
          <button class="btn btn-ghost" id="theme-btn" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
        </div>
      </header>
      <main class="container stack">

        <section class="card">
          <div class="row between mb-2">
            <div class="card-title" style="margin-bottom:0">Personal details</div>
            <button class="btn btn-ghost" type="button" id="edit-btn">
              <i data-lucide="pencil"></i> Edit details
            </button>
          </div>
          <form id="profile-form" class="stack profile-readonly">
            <div class="grid grid-2">
              <div><label>Name</label><input id="name" disabled /></div>
              <div><label>Email</label><input id="email" type="email" disabled /></div>
              <div><label>Age</label><input id="age" type="number" min="13" max="100" disabled /></div>
              <div><label>Sex</label>
                <select id="sex" disabled><option value="">—</option><option>male</option><option>female</option></select>
              </div>
              <div><label>Height (cm)</label><input id="heightCm" type="number" min="100" max="240" disabled /></div>
              <div><label>Weight (kg)</label><input id="weightKg" type="number" step="0.1" disabled /></div>
            </div>
            <div class="grid grid-2">
              <div><label>Daily calorie target</label><input id="cal" type="number" min="1200" max="4000" disabled /></div>
              <div><label>Goal</label>
                <select id="goal" disabled>
                  <option value="general_wellness">General wellness</option>
                  <option value="lose_weight">Lose weight</option>
                  <option value="maintain">Maintain weight</option>
                  <option value="gain_weight">Gain weight</option>
                </select>
              </div>
            </div>
            <div><label>Dietary restrictions</label><input id="diet" placeholder="comma-separated" disabled /></div>
            <div class="row gap-sm hidden" id="form-actions">
              <button class="btn btn-primary" type="submit">Save changes</button>
              <button class="btn btn-ghost" type="button" id="cancel-btn">Cancel</button>
            </div>
          </form>
        </section>

        <section class="card">
          <div class="card-title">Notifications</div>
          <label class="row gap-sm" style="cursor:pointer">
            <input id="notif-push" type="checkbox" style="width:auto"/> Push alerts for anomalies
          </label>
          <label class="row gap-sm mt-1" style="cursor:pointer">
            <input id="notif-email" type="checkbox" style="width:auto"/> Weekly email summary
          </label>
        </section>

        <section class="card">
          <div class="row between mb-2">
            <div class="card-title" style="margin-bottom:0">Connected devices</div>
            <button class="btn btn-ghost" type="button" id="add-device-btn">
              <i data-lucide="plus"></i> Add new
            </button>
          </div>
          <form id="device-form" class="stack hidden mb-2">
            <div class="grid grid-2">
              <div>
                <label for="device-name">Device name</label>
                <input id="device-name" placeholder="My Wearable" required />
              </div>
              <div>
                <label for="device-uid">Device UID / MAC</label>
                <input id="device-uid" placeholder="AA:BB:CC:DD:EE:FF" required />
              </div>
            </div>
            <div>
              <label for="device-type">Device type</label>
              <select id="device-type">
                <option value="wearable">Wearable (worn on body — HR, SpO₂, temp, steps)</option>
                <option value="station">Station (desk/scale — humidity, weight)</option>
              </select>
            </div>
            <div class="row gap-sm flex-wrap">
              <button class="btn btn-primary" type="submit" id="save-device-btn">Register device</button>
              <button class="btn btn-ghost" type="button" id="cancel-device-btn">Cancel</button>
            </div>
          </form>
          <div id="device-key" class="card card-tinted hidden mb-2"></div>
          <div class="list" id="devices-list">
            <div class="list-item muted">Loading devices...</div>
          </div>
        </section>

        <section class="card">
          <div class="card-title">Account</div>
          <div class="row gap-sm flex-wrap">
            <button class="btn btn-ghost" id="change-pw"><i data-lucide="key"></i> Change password</button>
            <button class="btn btn-ghost" id="logout-btn"><i data-lucide="log-out"></i> Log out</button>
          </div>
        </section>

      </main>
    </div>
  </div>
  <script async src="https://unpkg.com/lucide@latest" onload="window.lucide&&window.lucide.createIcons()"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
